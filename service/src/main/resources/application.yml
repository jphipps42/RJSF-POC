spring:
  application:
    name: rjsf-form-service

  datasource:
    url: jdbc:postgresql://localhost:5432/rjsf_forms
    username: rjsf_user
    password: rjsf_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  jackson:
    property-naming-strategy: SNAKE_CASE
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
    deserialization:
      fail-on-unknown-properties: false

server:
  port: 3001

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api/docs
  swagger-ui:
    path: /api/swagger-ui

logging:
  level:
    com.egs.rjsf: DEBUG
    org.hibernate.SQL: WARN
