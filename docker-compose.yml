services:
  postgres:
    image: postgres:16-alpine
    container_name: rjsf_postgres
    environment:
      POSTGRES_USER: rjsf_user
      POSTGRES_PASSWORD: rjsf_pass
      POSTGRES_DB: rjsf_forms
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/db/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  pgdata:
