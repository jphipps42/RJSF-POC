services:
  postgres:
    image: postgres:16-alpine
    container_name: rjsf_postgres
    environment:
      POSTGRES_USER: rjsf_user
      POSTGRES_PASSWORD: rjsf_pass
      POSTGRES_DB: rjsf_forms
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./service/src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql

  rjsf-service:
    build: ./service
    container_name: rjsf_service
    ports:
      - "3001:3001"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/rjsf_forms
      SPRING_DATASOURCE_USERNAME: rjsf_user
      SPRING_DATASOURCE_PASSWORD: rjsf_pass
    depends_on:
      - postgres

volumes:
  pgdata:
