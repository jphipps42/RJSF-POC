spring:
  datasource:
    url: jdbc:tc:postgresql:16-alpine:///rjsf_forms
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: always
      schema-locations: classpath:db/init.sql
  jackson:
    property-naming-strategy: SNAKE_CASE
  cache:
    type: caffeine

server:
  port: 0

transformer:
  template:
    dir: classpath:templates
    hot-reload: false
  cache:
    max-size: 50

logging:
  level:
    com.egs.rjsf: DEBUG

# E2E test configuration
e2e:
  base-url: http://localhost:5173
  service-url: http://localhost:3001
  headless: true
  timeout-seconds: 10
